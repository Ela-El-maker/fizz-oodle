global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["gateway-service:8000"]
    metrics_path: /metrics

  - job_name: scheduler
    static_configs:
      - targets: ["scheduler-service:8010"]
    metrics_path: /metrics

  - job_name: run_ledger
    static_configs:
      - targets: ["run-ledger-service:8011"]
    metrics_path: /metrics

  - job_name: agents
    static_configs:
      - targets:
          - "agent-a-service:8001"
          - "agent-b-service:8002"
          - "agent-c-service:8003"
          - "agent-d-service:8004"
          - "agent-e-service:8005"
          - "agent-f-service:8006"
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
