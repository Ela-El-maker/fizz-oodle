global:
  resolve_timeout: 5m

route:
  receiver: telegram-info
  group_by: ["alertname", "job", "instance", "agent_name"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - matchers:
        - severity="critical"
      receiver: telegram-critical
    - matchers:
        - severity="warning"
      receiver: telegram-warning

receivers:
  - name: telegram-info
    telegram_configs:
      - bot_token: "${TELEGRAM_BOT_TOKEN}"
        chat_id: ${TELEGRAM_CHAT_ID}
        parse_mode: ""
        message: "[INFO] {{ .CommonAnnotations.summary }}\n{{ .CommonAnnotations.description }}"

  - name: telegram-warning
    telegram_configs:
      - bot_token: "${TELEGRAM_BOT_TOKEN}"
        chat_id: ${TELEGRAM_CHAT_ID}
        parse_mode: ""
        message: "[WARNING] {{ .CommonAnnotations.summary }}\n{{ .CommonAnnotations.description }}"

  - name: telegram-critical
    telegram_configs:
      - bot_token: "${TELEGRAM_BOT_TOKEN}"
        chat_id: ${TELEGRAM_CHAT_ID}
        parse_mode: ""
        message: "[CRITICAL] {{ .CommonAnnotations.summary }}\n{{ .CommonAnnotations.description }}"
