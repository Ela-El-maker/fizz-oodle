<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="x-apple-disable-message-reformatting" />
    <title>{% block title %}Market Intel{% endblock %}</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #f4f6fb;
        color: #111827;
        font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      }
      table {
        border-collapse: collapse;
      }
      .page {
        width: 100%;
        background: #f4f6fb;
      }
      .container {
        width: 100%;
        max-width: 760px;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        overflow: hidden;
      }
      .header {
        background: linear-gradient(135deg, #0b1324 0%, #132043 100%);
        color: #f8fafc;
        padding: 20px 24px;
      }
      .header h1 {
        margin: 0;
        font-size: 21px;
        line-height: 1.3;
        font-weight: 700;
      }
      .header p {
        margin: 8px 0 0;
        font-size: 13px;
        line-height: 1.4;
        color: #cbd5e1;
      }
      .content {
        padding: 0;
      }
      .section {
        padding: 18px 24px;
        border-top: 1px solid #eef2f7;
      }
      .section-title {
        margin: 0;
        font-size: 12px;
        letter-spacing: 0.11em;
        text-transform: uppercase;
        color: #475569;
      }
      .section-subtitle {
        margin: 8px 0 0;
        font-size: 13px;
        color: #64748b;
      }
      .kpi-grid {
        width: 100%;
      }
      .kpi-cell {
        width: 50%;
        vertical-align: top;
        padding: 6px;
      }
      .kpi {
        border: 1px solid #e2e8f0;
        background: #f8fafc;
        border-radius: 10px;
        padding: 10px 12px;
      }
      .kpi-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #64748b;
      }
      .kpi-value {
        margin-top: 4px;
        font-size: 18px;
        font-weight: 700;
        color: #0f172a;
      }
      .story {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        margin-top: 12px;
        overflow: hidden;
      }
      .story-head {
        background: #f8fafc;
        border-bottom: 1px solid #e5e7eb;
        padding: 10px 12px;
      }
      .lane {
        display: inline-block;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .lane-kenya {
        color: #14532d;
        background: #dcfce7;
      }
      .lane-global {
        color: #1e3a8a;
        background: #dbeafe;
      }
      .impact {
        float: right;
        font-size: 11px;
        color: #334155;
      }
      .story-body {
        padding: 12px;
      }
      .story h3 {
        margin: 0 0 8px;
        font-size: 16px;
        line-height: 1.4;
      }
      .story p {
        margin: 7px 0;
        font-size: 13px;
        line-height: 1.6;
        color: #1f2937;
      }
      .muted {
        color: #64748b;
        font-size: 12px;
      }
      .bullet {
        margin: 8px 0 0 18px;
        padding: 0;
      }
      .bullet li {
        margin: 4px 0;
        font-size: 13px;
        color: #1f2937;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
      }
      .badge-high {
        background: #dcfce7;
        color: #14532d;
      }
      .badge-medium {
        background: #fef3c7;
        color: #92400e;
      }
      .badge-low {
        background: #fee2e2;
        color: #991b1b;
      }
      a {
        color: #1d4ed8;
        text-decoration: none;
      }
      .source-list {
        margin-top: 8px;
        font-size: 12px;
        color: #334155;
      }
      .source-list li {
        margin: 4px 0;
      }
      .callout {
        border-left: 3px solid #2563eb;
        background: #eff6ff;
        padding: 10px 12px;
        margin-top: 10px;
        border-radius: 8px;
      }
      .callout strong {
        display: block;
        margin-bottom: 4px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #1e3a8a;
      }
      .footer {
        padding: 14px 24px;
        border-top: 1px solid #e5e7eb;
        background: #f8fafc;
        font-size: 11px;
        color: #64748b;
      }
      @media only screen and (max-width: 640px) {
        .header,
        .section,
        .footer {
          padding-left: 16px;
          padding-right: 16px;
        }
        .kpi-cell {
          display: block;
          width: 100%;
          padding: 6px 0;
        }
      }
    </style>
  </head>
  <body>
    <table role="presentation" class="page" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center" style="padding:18px 10px;">
          <table role="presentation" class="container" cellpadding="0" cellspacing="0">
            <tr>
              <td class="header">
                <h1>{% block header_title %}Market Intel Update{% endblock %}</h1>
                <p>{% block header_subtitle %}Intelligence briefing{% endblock %}</p>
              </td>
            </tr>
            <tr>
              <td class="content">{% block content %}{% endblock %}</td>
            </tr>
            <tr>
              <td class="footer">{% block footer %}Automated intelligence output. Informational only, not investment advice.{% endblock %}</td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
