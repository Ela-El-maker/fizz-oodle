name: Stage4 Gate

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test-stage4-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: market_intel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d market_intel_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/market_intel_test
      REDIS_URL: redis://localhost:6379/0
      API_KEY: test-key
      EMAIL_DRY_RUN: "true"
      LLM_MODE: "off"
      SENTIMENT_FORCE_RESEND: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Stage 0 guardrails
        run: |
          python scripts/validate_configs.py
          python scripts/check_drift.py

      - name: Run tests (includes Stage 4 integration)
        run: python -m pytest -q
