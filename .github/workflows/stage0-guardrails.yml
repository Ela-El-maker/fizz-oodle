name: Stage0 Guardrails

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate-stage0:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Config contract validation
        run: python scripts/validate_configs.py

      - name: Drift guard validation
        run: python scripts/check_drift.py
