name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: market_intel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d market_intel_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/market_intel_test
      REDIS_URL: redis://localhost:6379/0
      API_KEY: test-key
      INTERNAL_API_KEY: internal-test-key
      EMAIL_DRY_RUN: "true"
      LLM_MODE: "off"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate config contracts
        run: python scripts/validate_configs.py

      - name: Run drift guards
        run: python scripts/check_drift.py

      - name: Run backend tests
        run: python -m pytest -q

      - name: Validate docker compose configs
        env:
          APP_IMAGE: ghcr.io/example/fizz-oodle:test
          INTERNAL_API_KEY: internal-test-key
        run: |
          cp .env.staging.example .env.staging
          cp .env.prod.example .env.prod
          docker compose -f docker-compose.staging.yml config >/dev/null
          docker compose -f docker-compose.prod.yml config >/dev/null

      - name: Dependency security scan
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
