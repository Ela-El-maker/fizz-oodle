name: Stage7 Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  deploy-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.STAGING_SSH_HOST != ''
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/fizz-oodle
            export APP_IMAGE="ghcr.io/${{ github.repository }}:${{ github.sha }}"
            docker compose -f docker-compose.staging.yml --env-file .env.staging pull || true
            docker compose -f docker-compose.staging.yml --env-file .env.staging up -d
            docker compose -f docker-compose.staging.yml --env-file .env.staging ps

  deploy-production:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production' && secrets.PROD_SSH_HOST != ''
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/fizz-oodle
            export APP_IMAGE="ghcr.io/${{ github.repository }}:${{ github.sha }}"
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull || true
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
            docker compose -f docker-compose.prod.yml --env-file .env.prod ps
